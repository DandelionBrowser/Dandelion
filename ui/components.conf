# Dandelion's XPCOM registrations. The build merges every components.conf
# reachable from a moz.build, so registering here costs no upstream patch.

Classes = [
    {
        'cid': '{0ebd2549-ddd1-436b-9e80-2e72d3bf24ee}',
        'contract_ids': ['@dandelion.browser/startup;1'],
        'esModule': 'resource:///modules/DandelionStartup.sys.mjs',
        'constructor': 'DandelionStartup',
        # The category entry is the whole bootstrap: it is what gets
        # Dandelion's first line of chrome code run without editing
        # BrowserGlue.
        'categories': {'profile-after-change': 'DandelionStartup'},
        'processes': ProcessSelector.MAIN_PROCESS_ONLY,
    },
    {
        'cid': '{ad9a7105-3717-427c-8a98-2439ca62e07b}',
        'contract_ids': ['@mozilla.org/network/protocol/about;1?what=dandelion'],
        'esModule': 'resource:///modules/AboutDandelion.sys.mjs',
        'constructor': 'AboutDandelion',
        # No process restriction: the page loads in the child, so the about
        # module has to be resolvable there too.
    },
]
